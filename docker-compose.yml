# Full pipeline in containers.
#
#   docker compose build                       # build the app image
#   docker compose run --rm trainer            # 1) generate data + train model
#   docker compose up -d kafka producer streaming dashboard   # 2) run the pipeline
#   docker compose logs -f streaming           # watch the streaming job
#   docker compose down                        # stop everything
#
# The dashboard runs headless and writes snapshots to ./output/dashboard.png.
# Host tools (e.g. `python src/producer.py`) reach the broker at localhost:9092;
# containers reach it at kafka:9094 (set via KAFKA_BOOTSTRAP below).

# Shared build config for every Python service (trainer/producer/streaming/dashboard).
x-app: &app
  build: .
  image: traffic-pipeline:latest
  environment:
    KAFKA_BOOTSTRAP: "kafka:9094"
  volumes:
    - ./data:/app/data
    - ./models:/app/models
    - ./output:/app/output
    - ./checkpoint:/app/checkpoint

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # --- KRaft (ZooKeeper-less) single-node config ---
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # --- Listeners ---
      # INTERNAL for other containers, EXTERNAL for your host (localhost:9092).
      KAFKA_CFG_LISTENERS: "INTERNAL://:9094,CONTROLLER://:9093,EXTERNAL://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka:9094,EXTERNAL://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      # Convenience for a single-node dev cluster.
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # One-shot: generate the sample data and train + persist the model.
  # Run this once before starting the pipeline:  docker compose run --rm trainer
  trainer:
    <<: *app
    command: >
      sh -c "python src/generate_sample_data.py && python src/train_model.py"
    restart: "no"

  # Simulates the sensor feed: publishes 50-100 collisions/sec to Kafka.
  producer:
    <<: *app
    command: ["python", "src/producer.py"]
    depends_on:
      kafka:
        condition: service_healthy

  # The streaming job: scores each accident and publishes rolling aggregations.
  streaming:
    <<: *app
    command: ["python", "src/spark_streaming.py"]
    depends_on:
      kafka:
        condition: service_healthy

  # Headless dashboard: writes output/dashboard.png every refresh.
  dashboard:
    <<: *app
    command: ["python", "src/dashboard.py", "--headless"]
    depends_on:
      kafka:
        condition: service_healthy
